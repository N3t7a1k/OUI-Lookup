services:
  webui:
    build:
      context: ./webui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - API_BASE_URL=http://api:5000
    env_file:
      - .env
  api:
    volumes:
      - ./api/data:/app/data
    build:
      context: ./api
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - HOST=0.0.0.0
      - PORT=5000
    env_file:
      - .env
